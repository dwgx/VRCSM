<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>VRC Settings Manager</title>
    <style>
      /* Minimal silky splash: a single thin arc spinning. Kept inline so
         the very first paint never shows an empty WebView2 frame, but
         intentionally low-key — no glyph, no captions, just motion. */
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0b10;
        color: #e4e4e7;
        overflow: hidden;
      }
      #vrcsm-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0b10;
        opacity: 1;
        transition: opacity 280ms ease-out;
        pointer-events: none;
      }
      html[data-splash-done="1"] #vrcsm-splash {
        opacity: 0;
      }
      .vrcsm-spinner {
        width: 32px;
        height: 32px;
        animation: vrcsm-spin 900ms cubic-bezier(0.45, 0, 0.55, 1) infinite;
      }
      .vrcsm-spinner circle {
        fill: none;
        stroke: rgba(226, 232, 240, 0.85);
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-dasharray: 60 100;
      }
      @keyframes vrcsm-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .vrcsm-spinner { animation: none; }
        .vrcsm-spinner circle { stroke-dasharray: none; }
      }
    </style>
  </head>
  <body>
    <div id="vrcsm-splash" aria-hidden="true">
      <svg class="vrcsm-spinner" viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="13" />
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
