<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>VRC Settings Manager</title>
    <style>
      /* --- VRCSM splash: paints before the JS bundle evaluates, then
           fades when main.tsx flips `data-splash-done`. Kept inline so
           there's no FOUC — WebView2 shows either the app or this. --- */
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0b10;
        color: #e4e4e7;
        overflow: hidden;
      }
      #vrcsm-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            ellipse at center,
            hsl(195 80% 12% / 0.9) 0%,
            hsl(260 50% 6% / 0.95) 40%,
            #06070c 100%
          );
        opacity: 1;
        transition: opacity 420ms ease-out;
        pointer-events: none;
      }
      html[data-splash-done="1"] #vrcsm-splash {
        opacity: 0;
      }
      .vrcsm-splash-core {
        position: relative;
        width: 160px;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .vrcsm-splash-core svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }
      .vrcsm-splash-glyph {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        font-weight: 800;
        font-size: 44px;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #7dd3fc 0%, #c084fc 45%, #f0abfc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        filter: drop-shadow(0 0 18px rgba(125, 211, 252, 0.25));
        animation: vrcsm-glyph-pulse 2s ease-in-out infinite;
      }
      .vrcsm-ring {
        stroke-linecap: round;
        fill: none;
      }
      .vrcsm-ring-outer {
        stroke: rgba(125, 211, 252, 0.5);
        stroke-width: 1.25;
        transform-origin: center;
        animation: vrcsm-spin 6s linear infinite;
      }
      .vrcsm-ring-mid {
        stroke: rgba(192, 132, 252, 0.55);
        stroke-width: 1;
        transform-origin: center;
        animation: vrcsm-spin-rev 8s linear infinite;
      }
      .vrcsm-dot {
        fill: #f0abfc;
        transform-origin: center;
      }
      .vrcsm-dot-a { animation: vrcsm-spin 3.5s linear infinite; }
      .vrcsm-dot-b { animation: vrcsm-spin-rev 4.8s linear infinite; }
      .vrcsm-splash-caption {
        margin-top: 28px;
        font-family: "JetBrains Mono", "Cascadia Code", "Consolas", ui-monospace, monospace;
        font-size: 10px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.5);
        animation: vrcsm-caption-in 700ms ease-out 120ms backwards;
      }
      .vrcsm-splash-sub {
        margin-top: 6px;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        font-size: 11px;
        color: rgba(148, 163, 184, 0.55);
        animation: vrcsm-caption-in 700ms ease-out 240ms backwards;
      }
      @keyframes vrcsm-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes vrcsm-spin-rev {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
      }
      @keyframes vrcsm-glyph-pulse {
        0%, 100% {
          transform: scale(1);
          filter: drop-shadow(0 0 18px rgba(125, 211, 252, 0.25));
        }
        50% {
          transform: scale(1.04);
          filter: drop-shadow(0 0 24px rgba(192, 132, 252, 0.45));
        }
      }
      @keyframes vrcsm-caption-in {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .vrcsm-ring-outer,
        .vrcsm-ring-mid,
        .vrcsm-dot-a,
        .vrcsm-dot-b { animation: none; }
        .vrcsm-splash-glyph { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="vrcsm-splash" aria-hidden="true">
      <div class="vrcsm-splash-core">
        <svg viewBox="-80 -80 160 160" preserveAspectRatio="xMidYMid meet">
          <circle class="vrcsm-ring vrcsm-ring-outer" cx="0" cy="0" r="72" stroke-dasharray="6 14" />
          <circle class="vrcsm-ring vrcsm-ring-mid" cx="0" cy="0" r="54" stroke-dasharray="3 10" />
          <g class="vrcsm-dot-a">
            <circle class="vrcsm-dot" cx="72" cy="0" r="2.5" />
          </g>
          <g class="vrcsm-dot-b">
            <circle class="vrcsm-dot" cx="0" cy="54" r="1.8" fill="#7dd3fc" />
          </g>
        </svg>
        <div class="vrcsm-splash-glyph">V</div>
      </div>
      <div class="vrcsm-splash-caption">VRC · Settings · Manager</div>
      <div class="vrcsm-splash-sub">Spinning up the host</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
