<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" role="img" aria-label="VRChat Auto-Uploader">
  <defs>
    <linearGradient id="vrcauBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#0a3fa8"/>
    </linearGradient>
    <linearGradient id="vrcauArrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d6e4ff"/>
    </linearGradient>
  </defs>

  <!-- rounded app-tile background -->
  <rect x="0" y="0" width="48" height="48" rx="11" fill="url(#vrcauBg)"/>

  <!-- avatar / VR headset glyph -->
  <g fill="#ffffff" opacity="0.92">
    <!-- head -->
    <circle cx="24" cy="16" r="6.2"/>
    <!-- visor band -->
    <rect x="16.6" y="14.2" width="14.8" height="4.6" rx="2.3" fill="#0a3fa8" opacity="0.55"/>
  </g>

  <!-- upload arrow rising from a batch stack -->
  <g>
    <!-- arrow shaft + head -->
    <path d="M24 39 L24 27.5 M24 27.5 L19.2 32.3 M24 27.5 L28.8 32.3"
          fill="none" stroke="url(#vrcauArrow)" stroke-width="3.1"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- batch base line (the 'multiple packages' cue) -->
    <rect x="16.5" y="40.4" width="15" height="3" rx="1.5" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>
