<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hello Plugin</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #101012;
        color: #e7e7ea;
      }
      h1 { font-size: 18px; margin: 0 0 4px 0; }
      p.muted { color: #8a8a92; font-size: 12px; margin: 0 0 18px 0; }
      .card {
        border: 1px solid #2a2a30;
        background: #17171a;
        border-radius: 8px;
        padding: 14px;
        max-width: 520px;
      }
      button {
        background: #7c5cff;
        color: white;
        border: 0;
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 12px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: wait; }
      pre {
        background: #0b0b0d;
        border: 1px solid #26262b;
        border-radius: 6px;
        padding: 10px;
        margin-top: 12px;
        font-size: 11.5px;
        color: #cbcbd6;
        max-height: 240px;
        overflow: auto;
      }
      .err { color: #ff6b6b; }
    </style>
  </head>
  <body>
    <h1>Hello Plugin</h1>
    <p class="muted">Reference plugin — invokes the host's scan handler through the permission gate.</p>
    <div class="card">
      <button id="run" type="button">Call scan</button>
      <pre id="out">(idle)</pre>
    </div>
    <script src="sdk-bundle.js"></script>
    <script>
      var btn = document.getElementById("run");
      var out = document.getElementById("out");
      btn.addEventListener("click", function () {
        btn.disabled = true;
        out.textContent = "calling scan…";
        out.className = "";
        window.vrcsm.call("scan", {}).then(function (report) {
          var entries = (report && report.cache_windows_player && report.cache_windows_player.entry_count) || 0;
          var cats = (report && report.category_summaries && report.category_summaries.length) || 0;
          out.textContent = "cache entries: " + entries + "\ncategories: " + cats;
        }).catch(function (err) {
          out.className = "err";
          out.textContent = (err && err.code ? "[" + err.code + "] " : "") + (err && err.message || err);
        }).then(function () {
          btn.disabled = false;
        });
      });
    </script>
  </body>
</html>
